name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate Env.swift
        env:
          COURIER_ACCESS_TOKEN: ${{ secrets.COURIER_ACCESS_TOKEN }}
          COURIER_USER_ID: ${{ secrets.COURIER_USER_ID }}
          COURIER_MESSAGE_TEMPLATE_ID: ${{ secrets.COURIER_MESSAGE_TEMPLATE_ID }}
          COURIER_PREFERENCE_TOPIC_ID: ${{ secrets.COURIER_PREFERENCE_TOPIC_ID }}
        run: |
          python3 << 'PY'
          import os
          src = f'''import Foundation

          class Env {{

              static let COURIER_ACCESS_TOKEN = "{os.environ.get('COURIER_ACCESS_TOKEN', '')}"
              static let COURIER_AUTH_KEY = "pk_prod_V1TMCW4FEG4PZNM52P4EM55D1SF2"
              static let COURIER_CLIENT_KEY = "NmE1MWJmOGMtYWQyZS00MmJmLWJlNmEtODM4NWI1ZDRhMGY1"
              static let COURIER_USER_ID = "{os.environ.get('COURIER_USER_ID', '')}"
              static let COURIER_BRAND_ID = "7S9RBWHHS9MBYRPSRYAFYF9K3Q1M"
              static let COURIER_MESSAGE_TEMPLATE_ID = "{os.environ.get('COURIER_MESSAGE_TEMPLATE_ID', '')}"
              static let COURIER_PREFERENCE_TOPIC_ID = "{os.environ.get('COURIER_PREFERENCE_TOPIC_ID', '')}"

          }}
          '''
          open("Tests/CourierTests/Env.swift", "w").write(src)
          PY

      - name: Boot simulator
        run: xcrun simctl boot "iPhone 16 Pro" || true

      - name: Run tests
        run: |
          xcodebuild -scheme Courier_iOS \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 10 \
            test

  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check version consistency
        run: |
          SWIFT_VERSION=$(grep 'internal static let version =' Sources/Courier_iOS/Courier_iOS.swift | awk -F '"' '{print $2}')
          PODSPEC_VERSION=$(grep "s\.version\s*=" Courier_iOS.podspec | head -1 | awk -F "'" '{print $2}')

          echo "Courier_iOS.swift version: $SWIFT_VERSION"
          echo "Courier_iOS.podspec version: $PODSPEC_VERSION"

          if [ "$SWIFT_VERSION" != "$PODSPEC_VERSION" ]; then
            echo "::error::Version mismatch! Courier_iOS.swift ($SWIFT_VERSION) != Courier_iOS.podspec ($PODSPEC_VERSION)"
            exit 1
          fi

          echo "Versions match: $SWIFT_VERSION"
